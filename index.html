/* Orqa animatsion fon */
body::before{
content:"";
position:fixed;
width:1000px;
height:1000px;
background:radial-gradient(circle, rgba(255,120,0,0.35), transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:fon 7s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes fon{
0%{ transform:translate(-50%,-50%) scale(1); }
100%{ transform:translate(-50%,-50%) scale(1.25); }
}

/* Logo */
.logo{
margin-top:40px;

.logo img{

0 0 10px #ff8c00,

0 0 40px rgba(255,100,0,0.5);

.tugma:hover{
