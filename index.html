<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHO ART OF WAR 3 KUTUBXONASI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#000;
color:#fff;
text-align:center;
min-height:100vh;
overflow-x:hidden;
}

/* Glow fon */
body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle, rgba(255,120,0,0.25), transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
animation:fon 8s infinite alternate ease-in-out;
}
@keyframes fon{
0%{transform:translate(-50%,-50%) scale(1);}
100%{transform:translate(-50%,-50%) scale(1.15);}
}

/* Logo */
.logo{margin-top:35px;}
.logo img{
max-width:340px;
width:85%;
filter:drop-shadow(0 0 18px #ff8c00);
}

/* Sarlavha */
.sarlavha{
margin:20px;
font-size:18px;
font-weight:800;
letter-spacing:1.5px;
color:#ffa726;
text-shadow:0 0 6px #ff8c00,0 0 12px rgba(255,140,0,0.6);
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
max-width:700px;
margin:50px auto;
padding:0 20px;
}

.tugma{
background:#111;
padding:18px;
border-radius:18px;
font-weight:bold;
border:1px solid #222;
transition:0.3s;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
cursor:pointer;
}

.tugma:hover{
transform:translateY(-4px);
border:1px solid orange;
box-shadow:0 0 12px rgba(255,140,0,0.6);
}

/* Xaritalar sahifa */
#xaritalar{display:none;padding-top:40px;}

.x-title{
font-size:22px;
color:#ffa726;
text-shadow:0 0 8px orange;
margin-bottom:30px;
}

.x-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
max-width:700px;
margin:0 auto 40px auto;
padding:0 20px;
}

.karta{
background:#111;
padding:15px;
border-radius:20px;
border:1px solid #222;
transition:0.3s;
cursor:pointer;
}

.karta:hover{
border:1px solid orange;
box-shadow:0 0 15px orange;
transform:translateY(-5px);
}

.karta img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.orqaga{
display:inline-block;
padding:8px 16px;
border-radius:20px;
background:#111;
border:1px solid #333;
cursor:pointer;
margin-bottom:50px;
}

.orqaga:hover{
border:1px solid orange;
box-shadow:0 0 8px orange;
}

/* Map detail */
#mapDetail{display:none;padding:40px 20px;}
</style>
</head>

<body>

<!-- ASOSIY SAHIFA -->
<div id="asosiy">

<div class="logo">
<img src="aow_logo_01.png">
</div>

<div class="sarlavha">
PSYCHO ART OF WAR 3 KUTUBXONASI
</div>

<div class="grid">
<div class="tugma" onclick="openMaps()"><i class="fa-solid fa-map"></i>Xaritalar</div>
<div class="tugma"><i class="fa-solid fa-medal"></i>Medallar</div>
<div class="tugma"><i class="fa-solid fa-user-ninja"></i>Qahramonlar</div>
<div class="tugma"><i class="fa-solid fa-jet-fighter"></i>Harbiy birliklar</div>
<div class="tugma"><i class="fa-solid fa-building"></i>Binolar</div>
<div class="tugma"><i class="fa-solid fa-image"></i>Avatarlar</div>
<div class="tugma"><i class="fa-solid fa-calendar"></i>Tadbirlar</div>
<div class="tugma"><i class="fa-solid fa-book"></i>Maqolalar</div>
<div class="tugma"><i class="fa-solid fa-newspaper"></i>Yangiliklar</div>
</div>

</div>

<!-- XARITALAR -->
<div id="xaritalar">

<div class="x-title">Xaritalar</div>

<div class="x-grid">

<div class="karta" onclick="showMap('Cho‘l zonasi','2v2','Tez hujum xaritasi.','chol.jpg')">
<img src="chol.jpg">
<h3>Cho‘l zonasi</h3>
<p>O‘lcham: 2v2</p>
</div>

<div class="karta" onclick="showMap('Qorli hudud','4v4','Himoyaviy janglar uchun.','qor.jpg')">
<img src="qor.jpg">
<h3>Qorli hudud</h3>
<p>O‘lcham: 4v4</p>
</div>

<div class="karta" onclick="showMap('Shahar xaritasi','3v3','Snayper va tanklar uchun qulay.','shahar.jpg')">
<img src="shahar.jpg">
<h3>Shahar xaritasi</h3>
<p>O‘lcham: 3v3</p>
</div>

<div class="karta" onclick="showMap('Dengiz fronti','2v2','Amfibiya birliklar ustun.','dengiz.jpg')">
<img src="dengiz.jpg">
<h3>Dengiz fronti</h3>
<p>O‘lcham: 2v2</p>
</div>

</div>

<div class="orqaga" onclick="backHome()">Orqaga</div>

</div>

<!-- MAP DETAIL -->
<div id="mapDetail">
<h2 id="mapName"></h2>
<img id="mapImage" style="width:90%;max-width:500px;border-radius:20px;margin:20px 0;">
<p id="mapSize"></p>
<p id="mapDesc"></p>
<div class="orqaga" onclick="backMaps()">Orqaga</div>
</div>

<script>
function openMaps(){
document.getElementById("asosiy").style.display="none";
document.getElementById("xaritalar").style.display="block";
}

function backHome(){
document.getElementById("xaritalar").style.display="none";
document.getElementById("asosiy").style.display="block";
}

function showMap(name,size,desc,img){
document.getElementById("xaritalar").style.display="none";
document.getElementById("mapDetail").style.display="block";
document.getElementById("mapName").innerText=name;
document.getElementById("mapSize").innerText="O‘lcham: "+size;
document.getElementById("mapDesc").innerText=desc;
document.getElementById("mapImage").src=img;
}

function backMaps(){
document.getElementById("mapDetail").style.display="none";
document.getElementById("xaritalar").style.display="block";
}
</script>

</body>
</html>
