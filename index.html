<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHO ART OF WAR 3 KUTUBXONASI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;text-align:center;min-height:100vh;overflow-x:hidden;}

/* Glow fon */
body::before{
content:"";
position:fixed;
width:900px;height:900px;
background:radial-gradient(circle, rgba(255,120,0,0.25), transparent 70%);
top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:-1;
animation:fon 8s infinite alternate ease-in-out;
}
@keyframes fon{
0%{transform:translate(-50%,-50%) scale(1);}
100%{transform:translate(-50%,-50%) scale(1.15);}
}

/* ASOSIY SAHIFA */
#asosiy{
display:block;
}

.logo{margin-top:35px;}
.logo img{
max-width:360px;width:85%;
filter:drop-shadow(0 0 18px #ff8c00);
}

.sarlavha{
margin:18px 20px 0;
font-size:17px;
font-weight:800;
letter-spacing:1.5px;
color:#ffa726;
text-shadow:0 0 6px #ff8c00,0 0 12px rgba(255,140,0,0.6);
}

.panjarasi{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
max-width:700px;
margin:50px auto;
padding:0 20px;
}

.tugma{
background:#111;
padding:18px;
border-radius:18px;
font-weight:bold;
border:1px solid #222;
transition:0.3s;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
cursor:pointer;
}

.tugma:hover{
transform:translateY(-4px);
border:1px solid orange;
box-shadow:0 0 12px rgba(255,140,0,0.6);
}

/* XARITALAR SAHIFA */
#xaritalar{
display:none;
padding-top:40px;
}

.x-title{
font-size:22px;
color:#ffa726;
text-shadow:0 0 8px orange;
}

.x-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
max-width:800px;
margin:40px auto;
padding:0 20px;
}

.karta{
background:#111;
padding:30px;
border-radius:20px;
border:1px solid #222;
transition:0.3s;
}

.karta:hover{
border:1px solid orange;
box-shadow:0 0 15px orange;
transform:translateY(-5px);
}

.orqaga{
margin-top:20px;
display:inline-block;
padding:6px 14px;
border-radius:20px;
background:#111;
border:1px solid #333;
cursor:pointer;
}

.orqaga:hover{
border:1px solid orange;
box-shadow:0 0 8px orange;
}
</style>
</head>

<body>

<!-- ASOSIY SAHIFA -->
<div id="asosiy">

<div class="logo">
<img src="aow_logo_01.png">
</div>

<div class="sarlavha">
PSYCHO ART OF WAR 3 KUTUBXONASI
</div>

<div class="panjarasi">

<div class="tugma" onclick="xaritaOch()">
<i class="fa-solid fa-map"></i> Xaritalar
</div>

<div class="tugma"><i class="fa-solid fa-medal"></i> Medallar</div>
<div class="tugma"><i class="fa-solid fa-user-ninja"></i> Qahramonlar</div>
<div class="tugma"><i class="fa-solid fa-jet-fighter"></i> Harbiy birliklar</div>
<div class="tugma"><i class="fa-solid fa-building"></i> Binolar</div>
<div class="tugma"><i class="fa-solid fa-image"></i> Avatarlar</div>
<div class="tugma"><i class="fa-solid fa-calendar"></i> Tadbirlar</div>
<div class="tugma"><i class="fa-solid fa-book"></i> Maqolalar</div>
<div class="tugma"><i class="fa-solid fa-newspaper"></i> Yangiliklar</div>

</div>

</div>

<!-- XARITALAR SAHIFASI -->
<div id="xaritalar">

<div class="x-title">Xaritalar</div>

<div class="x-grid">
<div class="karta">Cho‘l zonasi</div>
<div class="karta">Qorli hudud</div>
<div class="karta">Shahar xaritasi</div>
<div class="karta">Dengiz fronti</div>
</div>

<div class="orqaga" onclick="xaritaYop()">
<i class="fa-solid fa-arrow-left"></i> Orqaga qaytish
</div>

</div>

<script>
function xaritaOch(){
document.getElementById("asosiy").style.display="none";
document.getElementById("xaritalar").style.display="block";
window.scrollTo(0,0);
}

function xaritaYop(){
document.getElementById("xaritalar").style.display="none";
document.getElementById("asosiy").style.display="block";
window.scrollTo(0,0);
}
</script>

</body>
</html>
