<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHO AOW3 - Library</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#e6e6e6;
text-align:center;
}

header{
padding:30px 0;
}

.logo{
font-size:32px;
font-weight:bold;
color:orange;
text-shadow:0 0 10px orange;
}

.lang{
position:absolute;
right:20px;
top:30px;
background:white;
padding:8px 15px;
border-radius:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:600px;
margin:30px auto;
}

.card{
padding:15px;
border:2px solid #ccc;
border-radius:15px;
background:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:#f2f2f2;
transform:scale(1.05);
}

.banner{
margin:40px auto;
max-width:800px;
position:relative;
}

.banner img{
width:100%;
border-radius:10px;
}

.banner-text{
position:absolute;
bottom:20px;
left:20px;
right:20px;
color:white;
font-size:14px;
text-shadow:0 0 10px black;
}

.trailer{
display:inline-block;
margin-top:20px;
background:orange;
color:white;
padding:12px 30px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:50px;
padding:20px;
color:#666;
}
</style>
</head>

<body>

<div class="lang">🇺🇿 Uzbek</div>

<header>
<div class="logo">ART OF WAR<br>PSYCHO LIBRARY</div>
</header>

<div class="grid">
<div class="card">Xaritalar</div>
<div class="card">Medallar</div>
<div class="card">Qahramonlar</div>
<div class="card">Unitlar</div>
<div class="card">Binolar</div>
<div class="card">Avatarlar</div>
<div class="card">Tadbirlar</div>
<div class="card">Maqolalar</div>
<div class="card">Yangiliklar</div>
</div>

<div class="banner">
<img src="https://i.imgur.com/9QZ7Z6D.jpg">
<div class="banner-text">
Bu sayt Art of War 3 o‘yini uchun yaratilgan.
Bu yerda xaritalar, qahramonlar va unitlar haqida ma'lumot topasiz.
</div>
</div>

<a class="trailer" href="#">Treylr ko‘rish</a>

<footer>
© 2026 PSYCHO AOW3 | All Rights Reserved
</footer>

</body>
</html>
