/* Orqa fon glow */
body::before{
content:"";
position:fixed;
width:850px;
height:850px;
background:radial-gradient(circle, rgba(255,120,0,0.22), transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:fon 8s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes fon{
0%{ transform:translate(-50%,-50%) scale(1); }
100%{ transform:translate(-50%,-50%) scale(1.15); }
}

/* Logo */

margin-top:35px;

0 0 6px #ff8c00,
0 0 12px rgba(255,140,0,0.6);
}

/* Menyu */

display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
max-width:700px;
margin:50px auto;
padding:0 20px;
}

.tugma{
background:#111;
padding:18px;
border-radius:18px;

.tugma i{
font-size:20px;
}

.tugma:hover{
